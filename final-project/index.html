<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skyvault — Weather Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Animated sky background -->
  <div class="sky" id="sky">
    <div class="stars" id="stars"></div>
    <div class="clouds" id="clouds">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
    </div>
    <div class="rain-wrap" id="rain-wrap"></div>
    <div class="snow-wrap" id="snow-wrap"></div>
    <div class="sun" id="sun"></div>
    <div class="moon" id="moon"></div>
    <div class="lightning" id="lightning"></div>
  </div>
  <div class="glass-overlay"></div>

  <header>
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/><circle cx="12" cy="12" r="4"/></svg>
      Skyvault
    </div>
    <div class="search-wrap">
      <input type="text" id="city-input" placeholder="Search city…" autocomplete="off" />
      <button id="search-btn" title="Search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <button id="geo-btn" title="Use my location">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M1 12h4M19 12h4"/></svg>
      </button>
    </div>
  </header>

  <main>
    <div id="error-msg" class="error hidden"></div>

    <section id="hero" class="hidden">
      <div class="hero-left">
        <div class="location-row">
          <div class="city-name" id="city-name"></div>
          <div class="country-badge" id="country-name"></div>
        </div>
        <div class="local-time" id="local-time"></div>
        <div class="temp-row">
          <div class="big-temp" id="current-temp"></div>
          <div class="wx-icon" id="wx-icon"></div>
        </div>
        <div class="condition" id="condition"></div>
        <div class="meta-grid">
          <div class="meta-card">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>
            <span id="wind"></span>
          </div>
          <div class="meta-card">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
            <span id="humidity"></span>
          </div>
          <div class="meta-card">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 17.58A5 5 0 0 0 18 8h-1.26A8 8 0 1 0 4 16.25"/><line x1="8" y1="16" x2="8.01" y2="16"/><line x1="12" y1="18" x2="12.01" y2="18"/><line x1="16" y1="16" x2="16.01" y2="16"/></svg>
            <span id="precip"></span>
          </div>
          <div class="meta-card">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
            <span id="feels-like"></span>
          </div>
        </div>
      </div>
      <div class="hero-right">
        <div class="chart-card">
          <div class="chart-tabs">
            <button class="tab-btn active" data-tab="temp">Temperature</button>
            <button class="tab-btn" data-tab="rain">Precipitation</button>
          </div>
          <canvas id="temp-chart" width="460" height="180"></canvas>
          <canvas id="rain-chart" width="460" height="180" class="hidden"></canvas>
        </div>
      </div>
    </section>

    <section id="forecast-section" class="hidden">
      <h2 class="section-title">7-day forecast</h2>
      <div id="forecast-grid" class="forecast-grid"></div>
    </section>

    <div id="skeleton" class="skeleton-wrap hidden">
      <div class="sk sk-hero"></div>
      <div class="sk sk-grid"></div>
    </div>

    <div id="empty-state" class="empty-state">
      <div class="empty-anim">
        <div class="empty-sun"></div>
        <div class="empty-cloud"></div>
      </div>
      <p>Search a city to see the weather</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
